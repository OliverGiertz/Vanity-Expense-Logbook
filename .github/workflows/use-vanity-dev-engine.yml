name: use-vanity-dev-engine

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main, develop, "release/**", "fix/**", "feature/**"]

permissions:
  contents: read
  security-events: write
  pull-requests: write
  issues: write

jobs:
  use-vanity-dev-engine:
    if: ${{ vars.USE_VANITY_DEV_ENGINE == 'true' }}
    uses: OliverGiertz/vanity-dev-engine/.github/workflows/repo-pipeline.yml@de75e57c5e74f0fb2e0d477756f77a7cbc1f9ffb # v1.8
    secrets: inherit
    with:
      repo_type: ios
