name: use-vanity-dev-engine

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main, develop, "release/**", "fix/**", "feature/**"]

permissions:
  contents: read
  security-events: write
  pull-requests: write
  issues: write

jobs:
  use-vanity-dev-engine:
    if: ${{ vars.USE_VANITY_DEV_ENGINE == 'true' }}
    uses: OliverGiertz/vanity-dev-engine/.github/workflows/repo-pipeline.yml@967788e045a64c2bf5ee6be870de5386d8e49499 # v1.7
    secrets: inherit
    with:
      repo_type: ios
