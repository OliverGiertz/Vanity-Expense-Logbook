name: use-vanity-dev-engine

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main, develop, "release/**", "fix/**", "feature/**"]

permissions:
  contents: read
  security-events: write
  pull-requests: read
  issues: read

jobs:
  use-vanity-dev-engine:
    if: ${{ vars.USE_VANITY_DEV_ENGINE == 'true' }}
    uses: OliverGiertz/vanity-dev-engine/.github/workflows/repo-pipeline.yml@ec14acb46e65e566d04585bea167227f6af0aa6d # v1.6
    secrets: inherit
    with:
      repo_type: ios
