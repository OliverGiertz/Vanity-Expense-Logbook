name: version-guard

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

jobs:
  version-guard:
    name: version-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compare MARKETING_VERSION
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch origin "$BASE_REF" --depth=1
            BASE_FILE="$(mktemp)"
            git show "origin/$BASE_REF:CamperLogBook.xcodeproj/project.pbxproj" > "$BASE_FILE"
          else
            BASE_FILE="$(mktemp)"
            if ! git show "HEAD~1:CamperLogBook.xcodeproj/project.pbxproj" > "$BASE_FILE" 2>/dev/null; then
              echo "No previous commit to compare – skipping version guard."
              exit 0
            fi
          fi

          base_version=$(grep -m1 'MARKETING_VERSION = ' "$BASE_FILE" | sed -E 's/.*MARKETING_VERSION = ([^;]+);/\1/')
          head_version=$(grep -m1 'MARKETING_VERSION = ' CamperLogBook.xcodeproj/project.pbxproj | sed -E 's/.*MARKETING_VERSION = ([^;]+);/\1/')

          echo "Base MARKETING_VERSION: $base_version"
          echo "Head MARKETING_VERSION: $head_version"

          if [ -z "$base_version" ] || [ -z "$head_version" ]; then
            echo "Could not read MARKETING_VERSION from project file."
            exit 1
          fi

          if [ "$base_version" = "$head_version" ]; then
            echo "Version guard failed: MARKETING_VERSION was not bumped."
            echo "Every committed change must increase the app version."
            exit 1
          fi

          echo "Version guard passed."
